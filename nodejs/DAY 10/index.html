<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleeper Build Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #00ff41; padding: 40px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        button { background: #00ff41; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        pre { background: #000; padding: 15px; border-radius: 5px; color: #fff; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SYSTEMS ONLINE: USER DATABASE</h1>
        <p>Click below to pull data from your Node.js Server</p>
        <button onclick="getUsers()">FETCH USERS</button>
        
        <h3>Server Response:</h3>
        <pre id="output">No data yet...</pre>
    </div>

    <script>
        async function getUsers() {
            try {
                // This is the "Bridge" - calling your backend API
                const response = await fetch('http://localhost:5000/api/v1/users');
                const data = await response.json();
                
                // Display the data on the screen
                document.getElementById('output').innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('output').innerText = "ERROR: Server is offline!";
            }
        }
    </script>
</body>
</html>
